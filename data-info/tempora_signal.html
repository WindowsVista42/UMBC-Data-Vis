<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform Lifecycle: Rise and Fall (2000–2018)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1c1c1e;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .card {
    background: #232326;
    border-radius: 14px;
    padding: 28px 32px 24px;
    width: 100%;
    max-width: 900px;
  }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: #6e6e73; margin-bottom: 8px;
  }
  .header-row {
    display: flex; align-items: flex-start;
    justify-content: space-between; gap: 16px; margin-bottom: 4px; flex-wrap: wrap;
  }
  .title { font-size: 20px; font-weight: 700; color: #f0f0f5; line-height: 1.2; }
  .subtitle { font-size: 13px; color: #8e8e93; margin-top: 4px; margin-bottom: 14px; }

  .controls { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; flex-wrap: wrap; }
  .toggle-group { display: flex; gap: 4px; }
  .toggle-btn {
    padding: 6px 14px; border-radius: 9px; border: 1.5px solid #3a3a3e;
    background: transparent; color: #8e8e93; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap;
  }
  .toggle-btn.active       { border-color: #4f8ef7; color: #f0f0f5; background: rgba(79,142,247,0.12); }
  .toggle-btn.active-amber { border-color: #f0a030; color: #f0f0f5; background: rgba(240,160,48,0.12); }
  .toggle-btn:hover:not(.active):not(.active-amber) { border-color: #555; color: #c0c0c5; }
  .sep { width: 1px; background: #3a3a3e; margin: 0 2px; align-self: stretch; }

  .legend { display: flex; gap: 20px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
  .leg-item { display: flex; align-items: center; gap: 7px; font-size: 13px; color: #c0c0c5; }
  .leg-swatch { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }
  .leg-circle { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .chart-wrap { position: relative; width: 100%; height: 320px; }

  .detail-bar { margin-top: 12px; font-size: 13px; color: #8e8e93; min-height: 20px; line-height: 1.5; }
  .detail-bar b { color: #f0f0f5; font-weight: 700; }
  .detail-bar .amber { color: #f0a030; font-weight: 600; }
  .detail-bar .red   { color: #ff6b6b; }

  /* Axis note pill */
  .axis-note {
    display: inline-block; font-size: 10px; color: #f0a030;
    background: rgba(240,160,48,0.1); border: 1px solid rgba(240,160,48,0.25);
    border-radius: 4px; padding: 2px 7px; margin-left: 8px; vertical-align: middle;
  }
</style>
</head>
<body>
<div class="card">
  <div class="section-label">Temporal Signal</div>
  <div class="header-row">
    <div>
      <div class="title">Platform lifecycle: rise and fall (2000–2018)</div>
      <div class="subtitle">
        Annual interactions (bars) vs. avg rating (line) — hover to inspect
        <span class="axis-note">right axis zoomed to actual data range</span>
      </div>
    </div>
    <div class="controls">
      <div class="toggle-group">
        <button class="toggle-btn active" id="btnVolume" onclick="switchBar('count')">Volume</button>
        <button class="toggle-btn"        id="btnUsers"  onclick="switchBar('users')">Users</button>
      </div>
      <div class="sep"></div>
      <div class="toggle-group">
        <button class="toggle-btn active-amber" id="btnWith"    onclick="switchRating('with')">Incl. 0★</button>
        <button class="toggle-btn"              id="btnWithout" onclick="switchRating('without')">Excl. 0★</button>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="leg-item">
      <div class="leg-swatch" style="background:#7b7fd4;"></div>
      <span id="leg-bar-label">Annual interactions</span>
    </div>
    <div class="leg-item">
      <div class="leg-circle" style="background:#f0a030;"></div>
      <span id="leg-line-label">Avg rating — right axis</span>
    </div>
  </div>

  <div class="chart-wrap">
    <canvas id="myChart"></canvas>
  </div>

  <div class="detail-bar" id="detailBar">Hover a bar to see year details</div>
</div>

<script>
// ── EXACT values from interactions_train.csv ──────────────────────
// avg_with    = mean(rating) including 0-star entries  → range 4.10–4.64
// avg_without = mean(rating) where rating > 0 only     → range 4.43–4.73
// pct5        = % of all ratings (incl 0★) that are 5.0
const yearData = [
  {year:2000, count:18,     users:7,     avg_with:4.6111, avg_without:4.6111, pct5:72.2, n_zeros:0},
  {year:2001, count:1325,   users:247,   avg_with:4.0996, avg_without:4.4343, pct5:60.8, n_zeros:100},
  {year:2002, count:14246,  users:1446,  avg_with:4.5566, avg_without:4.6927, pct5:76.4, n_zeros:413},
  {year:2003, count:23322,  users:2287,  avg_with:4.6097, avg_without:4.7014, pct5:77.1, n_zeros:455},
  {year:2004, count:32786,  users:3398,  avg_with:4.6038, avg_without:4.6909, pct5:75.6, n_zeros:609},
  {year:2005, count:47986,  users:4784,  avg_with:4.6380, avg_without:4.7341, pct5:78.9, n_zeros:975},
  {year:2006, count:63934,  users:6575,  avg_with:4.6334, avg_without:4.7072, pct5:77.6, n_zeros:1002},
  {year:2007, count:98404,  users:9470,  avg_with:4.5569, avg_without:4.6115, pct5:70.6, n_zeros:1165},
  {year:2008, count:113353, users:11322, avg_with:4.5693, avg_without:4.6684, pct5:74.1, n_zeros:2407},
  {year:2009, count:103683, users:11729, avg_with:4.6144, avg_without:4.7071, pct5:77.4, n_zeros:2042},
  {year:2010, count:68725,  users:9407,  avg_with:4.5546, avg_without:4.7102, pct5:77.9, n_zeros:2269},
  {year:2011, count:44018,  users:6410,  avg_with:4.4887, avg_without:4.7076, pct5:77.7, n_zeros:2047},
  {year:2012, count:32377,  users:4884,  avg_with:4.5362, avg_without:4.7150, pct5:78.1, n_zeros:1228},
  {year:2013, count:25326,  users:3880,  avg_with:4.5309, avg_without:4.7127, pct5:78.0, n_zeros:977},
  {year:2014, count:13312,  users:2706,  avg_with:4.5137, avg_without:4.7171, pct5:78.8, n_zeros:574},
  {year:2015, count:5579,   users:1564,  avg_with:4.5779, avg_without:4.6957, pct5:78.8, n_zeros:140},
  {year:2016, count:3989,   users:1198,  avg_with:4.4818, avg_without:4.6594, pct5:77.2, n_zeros:152},
  {year:2017, count:4150,   users:1125,  avg_with:4.3728, avg_without:4.6771, pct5:78.1, n_zeros:270},
  {year:2018, count:2368,   users:703,   avg_with:4.4375, avg_without:4.6995, pct5:79.2, n_zeros:132},
];

const labels   = yearData.map(d => String(d.year));
let barMode    = 'count';
let ratingMode = 'with';
let chart;

const PURPLE = '#7b7fd4';
const ORANGE = '#f0a030';
const GRID   = 'rgba(255,255,255,0.07)';
const TICK   = '#6e6e73';

// Axis config per rating mode — tight range so the line uses full chart height
// incl 0★:  data is 4.10–4.64  → axis 3.80–4.80  (range=1.0, padding ~0.15 each side)
// excl 0★:  data is 4.43–4.73  → axis 4.20–4.90  (range=0.7, padding ~0.13 each side)
// This is the correct approach: zoom in on the data, label the axis honestly,
// and add a pill note saying the axis is zoomed. The line then meaningfully
// shows rises and dips rather than flatlining.
const AXIS_CFG = {
  with:    { min: 3.80, max: 4.80, step: 0.2 },
  without: { min: 4.20, max: 4.90, step: 0.1 },
};

function fmtK(v) { return v >= 1000 ? Math.round(v/1000)+'k' : v; }

function buildChart() {
  const barData    = barMode === 'count' ? yearData.map(d=>d.count) : yearData.map(d=>d.users);
  const ratingVals = ratingMode === 'with' ? yearData.map(d=>d.avg_with) : yearData.map(d=>d.avg_without);
  const barMax     = barMode === 'count' ? 120000 : 14000;
  const barStep    = barMode === 'count' ? 20000  : 2000;
  const ax         = AXIS_CFG[ratingMode];

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById('myChart'), {
    data: {
      labels,
      datasets: [
        {
          type: 'bar',
          label: barMode === 'count' ? 'Annual interactions' : 'Unique users',
          data: barData,
          backgroundColor: PURPLE + 'bb',
          hoverBackgroundColor: PURPLE + 'ee',
          borderRadius: 4,
          borderSkipped: false,
          yAxisID: 'y',
          order: 2,
        },
        {
          type: 'line',
          label: 'Avg rating',
          data: ratingVals,
          borderColor: ORANGE,
          backgroundColor: 'transparent',
          borderWidth: 2.5,
          pointBackgroundColor: ORANGE,
          pointBorderColor: ORANGE,
          pointRadius: 5,
          pointHoverRadius: 7,
          pointHoverBackgroundColor: '#fff',
          pointHoverBorderColor: ORANGE,
          pointHoverBorderWidth: 2,
          tension: 0.35,
          yAxisID: 'y2',
          order: 1,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      onHover(evt, elements) { if (elements.length) updateDetail(elements[0].index); },
      onClick(evt, elements)  { if (elements.length) updateDetail(elements[0].index); },
      plugins: {
        legend: { display: false },
        tooltip: { enabled: false },
      },
      scales: {
        x: {
          ticks: { color: TICK, font:{size:11}, autoSkip:false, maxRotation:0 },
          grid: { color: GRID },
          border: { color: 'transparent' },
        },
        y: {
          position: 'left',
          min: 0, max: barMax,
          ticks: { color: TICK, font:{size:11}, callback: v=>fmtK(v), stepSize: barStep },
          grid: { color: GRID },
          border: { color: 'transparent' },
        },
        y2: {
          position: 'right',
          min: ax.min,
          max: ax.max,
          ticks: {
            color: ORANGE,
            font: { size: 11 },
            callback: v => v.toFixed(1),
            stepSize: ax.step,
          },
          grid: { display: false },
          border: { color: 'transparent' },
        }
      }
    }
  });
}

let lastIdx = -1;
function updateDetail(i) {
  if (i === lastIdx) return;
  lastIdx = i;
  const d   = yearData[i];
  const avg = ratingMode === 'with' ? d.avg_with : d.avg_without;
  const zeroNote = d.n_zeros > 0
    ? ` · <span class="red">${d.n_zeros.toLocaleString()} zero-star entries (${(d.n_zeros/d.count*100).toFixed(1)}%)</span>`
    : '';
  document.getElementById('detailBar').innerHTML =
    `<b>${d.year}</b> — ${d.count.toLocaleString()} interactions · ${d.users.toLocaleString()} users · `+
    `avg <span class="amber">★${avg.toFixed(4)}</span> · `+
    `<span class="amber">${d.pct5.toFixed(1)}% rated 5★</span>`+
    zeroNote;
}

function switchBar(m) {
  barMode = m;
  document.getElementById('btnVolume').classList.toggle('active', m==='count');
  document.getElementById('btnUsers').classList.toggle('active',  m==='users');
  document.getElementById('leg-bar-label').textContent = m==='count' ? 'Annual interactions' : 'Unique users';
  lastIdx = -1; buildChart();
  updateDetail(yearData.findIndex(d=>d.year===2015));
}

function switchRating(m) {
  ratingMode = m;
  document.getElementById('btnWith').classList.toggle('active-amber',    m==='with');
  document.getElementById('btnWithout').classList.toggle('active-amber', m==='without');
  document.getElementById('leg-line-label').textContent =
    m==='with' ? 'Avg rating incl. 0★ — right axis' : 'Avg rating excl. 0★ — right axis';
  lastIdx = -1; buildChart();
  updateDetail(yearData.findIndex(d=>d.year===2015));
}

buildChart();
updateDetail(yearData.findIndex(d=>d.year===2015));
</script>
</body>
</html>
