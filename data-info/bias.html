<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The 5-Star Inflation Problem</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1c1c1e;
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px;
  }
  .card {
    background: #232326;
    border-radius: 14px;
    padding: 28px 32px 28px;
    width: 100%;
    max-width: 560px;
  }
  .section-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.09em;
    text-transform: uppercase; color: #6e6e73; margin-bottom: 10px;
  }
  .title { font-size: 24px; font-weight: 700; color: #f0f0f5; line-height: 1.2; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #8e8e93; margin-bottom: 20px; line-height: 1.4; }

  /* Legend grid */
  .legend {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px 0;
    margin-bottom: 16px;
  }
  .leg-item {
    display: flex; align-items: center; gap: 7px;
    font-size: 13px; color: #c0c0c5; cursor: pointer;
    padding: 3px 6px; border-radius: 6px;
    transition: background 0.15s;
  }
  .leg-item:hover { background: rgba(255,255,255,0.06); }
  .leg-item.dimmed { opacity: 0.35; }
  .leg-dot { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; }

  .chart-wrap { position: relative; width: 100%; height: 280px; margin-bottom: 20px; }

  /* Insight pills */
  .pills { display: flex; flex-direction: column; gap: 8px; }
  .pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 14px; border-radius: 22px; font-size: 13px;
    font-weight: 500; cursor: default; width: fit-content;
    transition: transform 0.15s, box-shadow 0.15s;
    border: 1.5px solid transparent;
  }
  .pill:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .pill-red   { background: rgba(224,82,82,0.15);  border-color: rgba(224,82,82,0.5);  color: #ff8080; }
  .pill-amber { background: rgba(214,158,46,0.15); border-color: rgba(214,158,46,0.5); color: #f0c060; }

  /* Tooltip */
  .tooltip-box {
    position: absolute; pointer-events: none;
    background: #2c2c2f; border: 1px solid #3a3a3e;
    border-radius: 8px; padding: 9px 13px;
    font-size: 12px; color: #e0e0e5;
    z-index: 10; display: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .tooltip-box .tt-label { font-weight: 700; margin-bottom: 3px; }
  .tooltip-box .tt-count { color: #8e8e93; font-size: 11px; }
</style>
</head>
<body>
<div class="card">
  <div class="section-label">Bias Spotlight</div>
  <div class="title">The 5-star inflation problem</div>
  <div class="subtitle">Rating distribution — what users actually submitted</div>

  <div class="legend" id="legend"></div>

  <div class="chart-wrap">
    <canvas id="chart"></canvas>
    <div class="tooltip-box" id="tooltip">
      <div class="tt-label" id="tt-label"></div>
      <div id="tt-pct"></div>
      <div class="tt-count" id="tt-count"></div>
    </div>
  </div>

  <div class="pills">
    <div class="pill pill-red">74% of all ratings are 5★</div>
    <div class="pill pill-amber">Only 1.5% give 1 or 2 stars</div>
  </div>
</div>

<script>
// Exact data from interactions_train.csv
const data = [
  { label: '0★', count: 16957,  pct: 2.43,  color: '#e05252', tier: 'Danger' },
  { label: '1★', count: 3341,   pct: 0.48,  color: '#d85a30', tier: 'Very Low' },
  { label: '2★', count: 6852,   pct: 0.98,  color: '#EF9F27', tier: 'Low' },
  { label: '3★', count: 25781,  pct: 3.69,  color: '#378ADD', tier: 'Moderate' },
  { label: '4★', count: 127402, pct: 18.23, color: '#1D9E75', tier: 'High' },
  { label: '5★', count: 518568, pct: 74.20, color: '#639922', tier: 'Dominant' },
];

const total = 698901;
let hidden = new Set();

// Build legend
const legendEl = document.getElementById('legend');
data.forEach((d, i) => {
  const item = document.createElement('div');
  item.className = 'leg-item';
  item.id = 'leg-' + i;
  item.innerHTML = `<span class="leg-dot" style="background:${d.color}"></span>${d.label} ${d.pct}%`;
  item.addEventListener('click', () => toggleBar(i));
  legendEl.appendChild(item);
});

// Build chart
const chart = new Chart(document.getElementById('chart'), {
  type: 'bar',
  data: {
    labels: data.map(d => d.label),
    datasets: [{
      data: data.map(d => d.pct),
      backgroundColor: data.map(d => d.color + 'cc'),
      hoverBackgroundColor: data.map(d => d.color),
      borderRadius: 5,
      borderSkipped: false,
    }]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { enabled: false },
    },
    onHover(evt, elements) {
      const tip = document.getElementById('tooltip');
      if (!elements.length) { tip.style.display = 'none'; return; }
      const i = elements[0].index;
      const d = data[i];
      document.getElementById('tt-label').textContent = d.label + ' ratings';
      document.getElementById('tt-pct').textContent   = d.pct.toFixed(2) + '% of all ratings';
      document.getElementById('tt-count').textContent = d.count.toLocaleString() + ' total submissions';

      const rect = document.getElementById('chart').getBoundingClientRect();
      const cardRect = document.querySelector('.card').getBoundingClientRect();
      tip.style.display = 'block';
      let left = evt.native.clientX - cardRect.left + 10;
      let top  = evt.native.clientY - cardRect.top  - 60;
      // keep in bounds
      if (left + 200 > cardRect.width) left = cardRect.width - 210;
      tip.style.left = left + 'px';
      tip.style.top  = top  + 'px';
    },
    scales: {
      x: {
        ticks: { color: '#6e6e73', font: { size: 12 } },
        grid: { color: 'rgba(255,255,255,0.07)' },
        border: { color: 'transparent' },
      },
      y: {
        min: 0, max: 80,
        ticks: {
          color: '#6e6e73', font: { size: 11 },
          callback: v => v + '%',
          stepSize: 10,
        },
        grid: { color: 'rgba(255,255,255,0.07)' },
        border: { color: 'transparent' },
      }
    },
    animation: { duration: 500, easing: 'easeOutQuart' },
  }
});

function toggleBar(i) {
  const legItem = document.getElementById('leg-' + i);
  if (hidden.has(i)) {
    hidden.delete(i);
    legItem.classList.remove('dimmed');
  } else {
    hidden.add(i);
    legItem.classList.add('dimmed');
  }
  chart.data.datasets[0].backgroundColor = data.map((d, j) =>
    hidden.has(j) ? 'rgba(255,255,255,0.05)' : d.color + 'cc'
  );
  chart.data.datasets[0].hoverBackgroundColor = data.map((d, j) =>
    hidden.has(j) ? 'rgba(255,255,255,0.08)' : d.color
  );
  chart.update();
}

// Hide tooltip when mouse leaves chart area
document.getElementById('chart').addEventListener('mouseleave', () => {
  document.getElementById('tooltip').style.display = 'none';
});
</script>
</body>
</html>
